; 运行入口参数（在 config.ini 中设置后，main.py 可无参运行）
; CLI 参数优先级高于此配置
[main]
; 原始媒体库目录（原 -s 参数）
source =
; 工作区目录（原 -w 参数），程序会在此创建 dist 和 tmp
workspace =
; Cloudflare Pages 项目名称（原 -p 参数）
project_name =

[media]
; Cloudflare Pages 单文件大小限制 (字节)
max_file_size = 25165824

; 图片压缩参数
[image]
; 初始画质 (0-100)
quality_start = 95
; 最低画质
quality_min = 20
; 画质递减步长
quality_step = 5
; 初始分辨率缩放比例
scale_start = 0.9
; 最低缩放比例
scale_min = 0.3
; 缩放递减步长
scale_step = 0.1

; 音频压缩参数
[audio]
; 安全目标大小 (字节)，略小于 max_file_size 留余量
safe_target_bytes = 24641536
; 最大码率 (kbps)
bitrate_max = 320
; 最低码率 (kbps)
bitrate_min = 32
; 超标后码率衰减系数
bitrate_reduction_factor = 0.8

; 视频 HLS 复制模式 (不重新编码，直接切片，保留原始画质)
; 将此处的 video_mode 改为 copy 以启用，改为 encode 则使用硬件/软件编码
[video]
mode = copy
; 当 mode=copy 时使用的音频编码参数
audio_copy_codec = copy
audio_copy_bitrate = 128k

[video.copy]
; 复制模式下 ffmpeg 直接切片，保留原始视频编码和音频
; 无额外参数需要调整，默认按 3秒/HLS标准 切片

; 视频 HLS 硬件编码参数
[video.hw]
hwaccel = cuda
hwaccel_output_format = cuda
filter = scale_cuda=format=nv12
codec = h264_nvenc
preset = p6
profile = high
level = 5.2
rc = vbr
bitrate = 18M
maxrate = 24M
bufsize = 36M
gop_size = 144
keyint_min = 144
sc_threshold = 0
audio_codec = aac
audio_bitrate = 320k
hls_time = 6
hls_playlist_type = vod

; 视频 HLS 软件编码参数 (硬件失败时的回退)
[video.sw]
codec = libx264
preset = medium
crf = 20
filter = scale=format=yuv420p
gop_size = 144
keyint_min = 144
sc_threshold = 0
audio_codec = aac
audio_bitrate = 320k
hls_time = 6
hls_playlist_type = vod

; 小视频 MP4 硬件编码参数
[video.mp4.hw]
hwaccel = cuda
hwaccel_output_format = cuda
filter = scale_cuda=format=nv12
codec = h264_nvenc
preset = p6
tune = hq
profile = high
cq = 22
audio_codec = aac
audio_bitrate = 320k
movflags = +faststart

; 小视频 MP4 软件编码参数
[video.mp4.sw]
codec = libx264
preset = slow
crf = 22
pix_fmt = yuv420p
audio_codec = aac
audio_bitrate = 320k
movflags = +faststart

; 字幕过滤 (ASS 样式关键词，命中则跳过)
[subtitle]
; 过滤关键词 (逗号分隔，不区分大小写)
filter_keywords = jp, jpn, 日, romaji

; 字幕语言映射 (VTT srclang 属性)
[subtitle.lang]
sc = zh
chs = zh
zh = zh
tc = zh-Hant
cht = zh-Hant
hant = zh-Hant
default = und

; 工作区目录名
[workspace]
dist_dirname = dist
tmp_dirname = tmp

; 网页密码鉴权（仅前端保护，阻挡一般访问）
[auth]
; 是否启用密码鉴权（true/false）
enabled = false
; 访问密码（留空则不设密码）
password =
; 密码提示语
prompt = 请输入访问密码
; 错误提示语
error_tip = 密码错误

; 网页标题与图标
[site]
; 网页标题（可通过 main.py -t 参数覆盖，不设置则用此默认值）
title = 喵喵喵的观影台
; 网站图标 - 可以是本地文件路径（相对于项目目录）或完整 URL
; 示例本地路径: ./static/custom-favicon.ico
; 示例远程 URL: https://example.com/favicon.ico
; 留空或注释掉则使用 static/favicon.png
favicon =

; Cloudflare Pages 部署凭证与命令
[cloudflare]
; API 令牌（也可通过 CLOUDFLARE_API_TOKEN 环境变量设置，优先级：环境变量 > 此配置）
api_token =
; 账户 ID（也可通过 CLOUDFLARE_ACCOUNT_ID 环境变量设置）
account_id =
; Wrangler 项目创建命令
project_create_cmd = npx wrangler pages project create {project_name} --production-branch main
; Wrangler 部署命令
deploy_cmd = npx wrangler pages deploy {dist_dir} --project-name {project_name}
upload_threshold_mb = 512

; CORS 配置 (部署时生成 _headers 文件)
[cors]
allow_origin = *
allow_methods = GET, HEAD, OPTIONS